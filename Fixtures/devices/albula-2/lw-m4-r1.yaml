substitutions:
    name: m4-r1
packages:
    device: !include ../packages/device-d1mini.yaml
    networking: !include ../packages/networking.yaml
esphome:
    on_boot:
        - priority: 800
          then:
            - switch.turn_off: out_a_in_a_l1inverter
            - switch.turn_off: out_a_in_b_l1inverter
            - switch.turn_off: out_b_in_a_l1inverter
            - switch.turn_off: out_b_in_b_l1inverter
            - switch.turn_off: out_a_in_a_l4inverter
            - switch.turn_off: out_a_in_b_l4inverter
            - switch.turn_off: out_b_in_a_l4inverter
            - switch.turn_off: out_b_in_b_l4inverter
        - priority: 600
          then:
            - switch.turn_on: led_yellow
            - switch.turn_on: led_green
            - switch.turn_on: led_red
            - delay: 2s
            - switch.turn_off: led_yellow
            - switch.turn_off: led_green
            - switch.turn_off: led_red
logger:
    level: DEBUG
mqtt:
    on_connect:
        - switch.turn_on: led_green
    on_disconnect:
        - switch.turn_off: led_green
    topic_prefix: /binky/m4-r1/info
ota:
    platform: esphome
web_server:
    port: 80
    local: true
wifi:
    fast_connect: true
    domain: .tzl
    on_connect:
        - switch.turn_on: led_yellow
    on_disconnect:
        - switch.turn_off: led_yellow
interval:
    - interval: 15s
      then:
        - lambda: if (id(ios4_pin1).state) { id(ios4_pin1).publish_state(true); } else { id(ios4_pin1).publish_state(false); }
        - lambda: if (id(ios4_pin2).state) { id(ios4_pin2).publish_state(true); } else { id(ios4_pin2).publish_state(false); }
        - lambda: if (id(ios4_pin3).state) { id(ios4_pin3).publish_state(true); } else { id(ios4_pin3).publish_state(false); }
        - lambda: if (id(ios4_pin4).state) { id(ios4_pin4).publish_state(true); } else { id(ios4_pin4).publish_state(false); }
        - lambda: if (id(ios4_pin5).state) { id(ios4_pin5).publish_state(true); } else { id(ios4_pin5).publish_state(false); }
        - lambda: if (id(ios4_pin6).state) { id(ios4_pin6).publish_state(true); } else { id(ios4_pin6).publish_state(false); }
        - lambda: if (id(ios4_pin7).state) { id(ios4_pin7).publish_state(true); } else { id(ios4_pin7).publish_state(false); }
        - lambda: if (id(ios4_pin8).state) { id(ios4_pin8).publish_state(true); } else { id(ios4_pin8).publish_state(false); }
binary_sensor:
    - platform: gpio
      id: ios4_pin1
      name: ios4_pin1
      state_topic: /binky/m4/ios4_pin1/sensor/state
      qos: 1
      pin:
        number: "0"
        mcp23xxx: ios4
        mode:
            input: true
      on_state:
        then:
            - switch.turn_on: led_red
            - delay: 0.2s
            - switch.turn_off: led_red
    - platform: gpio
      id: ios4_pin2
      name: ios4_pin2
      state_topic: /binky/m4/ios4_pin2/sensor/state
      qos: 1
      pin:
        number: "1"
        mcp23xxx: ios4
        mode:
            input: true
      on_state:
        then:
            - switch.turn_on: led_red
            - delay: 0.2s
            - switch.turn_off: led_red
    - platform: gpio
      id: ios4_pin3
      name: ios4_pin3
      state_topic: /binky/m4/ios4_pin3/sensor/state
      qos: 1
      pin:
        number: "2"
        mcp23xxx: ios4
        mode:
            input: true
      on_state:
        then:
            - switch.turn_on: led_red
            - delay: 0.2s
            - switch.turn_off: led_red
    - platform: gpio
      id: ios4_pin4
      name: ios4_pin4
      state_topic: /binky/m4/ios4_pin4/sensor/state
      qos: 1
      pin:
        number: "3"
        mcp23xxx: ios4
        mode:
            input: true
      on_state:
        then:
            - switch.turn_on: led_red
            - delay: 0.2s
            - switch.turn_off: led_red
    - platform: gpio
      id: ios4_pin5
      name: ios4_pin5
      state_topic: /binky/m4/ios4_pin5/sensor/state
      qos: 1
      pin:
        number: "4"
        mcp23xxx: ios4
        mode:
            input: true
      on_state:
        then:
            - switch.turn_on: led_red
            - delay: 0.2s
            - switch.turn_off: led_red
    - platform: gpio
      id: ios4_pin6
      name: ios4_pin6
      state_topic: /binky/m4/ios4_pin6/sensor/state
      qos: 1
      pin:
        number: "5"
        mcp23xxx: ios4
        mode:
            input: true
      on_state:
        then:
            - switch.turn_on: led_red
            - delay: 0.2s
            - switch.turn_off: led_red
    - platform: gpio
      id: ios4_pin7
      name: ios4_pin7
      state_topic: /binky/m4/ios4_pin7/sensor/state
      qos: 1
      pin:
        number: "6"
        mcp23xxx: ios4
        mode:
            input: true
      on_state:
        then:
            - switch.turn_on: led_red
            - delay: 0.2s
            - switch.turn_off: led_red
    - platform: gpio
      id: ios4_pin8
      name: ios4_pin8
      state_topic: /binky/m4/ios4_pin8/sensor/state
      qos: 1
      pin:
        number: "7"
        mcp23xxx: ios4
        mode:
            input: true
      on_state:
        then:
            - switch.turn_on: led_red
            - delay: 0.2s
            - switch.turn_off: led_red
button:
    - platform: restart
      id: reboot
      name: reboot
sensor:
    - platform: uptime
      id: uptime_sensor
      name: uptime_sensor
      state_topic: /binky/m4-r1/info/uptime
      update_interval: 15s
    - platform: wifi_signal
      id: wifi_signal_sensor
      name: wifi_signal_sensor
      state_topic: /binky/m4-r1/info/wifi_signal
switch:
    - platform: gpio
      id: led_red
      name: led_red
      pin:
        number: D5
        inverted: true
    - platform: gpio
      id: led_yellow
      name: led_yellow
      pin:
        number: D6
        inverted: true
    - platform: gpio
      id: led_green
      name: led_green
      pin:
        number: D7
        inverted: true
    - platform: gpio
      id: out_a_in_a_l1inverter
      name: out_a_in_a_l1inverter
      state_topic: /binky/GLOBAL/l1inverter/relay-out-a-in-a/state
      command_topic: /binky/GLOBAL/l1inverter/relay-out-a-in-a/command
      pin:
        number: "12"
        mcp23xxx: io2
        mode:
            output: true
    - platform: gpio
      id: out_a_in_b_l1inverter
      name: out_a_in_b_l1inverter
      state_topic: /binky/GLOBAL/l1inverter/relay-out-a-in-b/state
      command_topic: /binky/GLOBAL/l1inverter/relay-out-a-in-b/command
      pin:
        number: "13"
        mcp23xxx: io2
        mode:
            output: true
    - platform: gpio
      id: out_b_in_a_l1inverter
      name: out_b_in_a_l1inverter
      state_topic: /binky/GLOBAL/l1inverter/relay-out-b-in-a/state
      command_topic: /binky/GLOBAL/l1inverter/relay-out-b-in-a/command
      pin:
        number: "14"
        mcp23xxx: io2
        mode:
            output: true
    - platform: gpio
      id: out_b_in_b_l1inverter
      name: out_b_in_b_l1inverter
      state_topic: /binky/GLOBAL/l1inverter/relay-out-b-in-b/state
      command_topic: /binky/GLOBAL/l1inverter/relay-out-b-in-b/command
      pin:
        number: "15"
        mcp23xxx: io2
        mode:
            output: true
    - platform: gpio
      id: out_a_in_a_l4inverter
      name: out_a_in_a_l4inverter
      state_topic: /binky/GLOBAL/l4inverter/relay-out-a-in-a/state
      command_topic: /binky/GLOBAL/l4inverter/relay-out-a-in-a/command
      pin:
        number: "12"
        mcp23xxx: io3
        mode:
            output: true
    - platform: gpio
      id: out_a_in_b_l4inverter
      name: out_a_in_b_l4inverter
      state_topic: /binky/GLOBAL/l4inverter/relay-out-a-in-b/state
      command_topic: /binky/GLOBAL/l4inverter/relay-out-a-in-b/command
      pin:
        number: "13"
        mcp23xxx: io3
        mode:
            output: true
    - platform: gpio
      id: out_b_in_a_l4inverter
      name: out_b_in_a_l4inverter
      state_topic: /binky/GLOBAL/l4inverter/relay-out-b-in-a/state
      command_topic: /binky/GLOBAL/l4inverter/relay-out-b-in-a/command
      pin:
        number: "14"
        mcp23xxx: io3
        mode:
            output: true
    - platform: gpio
      id: out_b_in_b_l4inverter
      name: out_b_in_b_l4inverter
      state_topic: /binky/GLOBAL/l4inverter/relay-out-b-in-b/state
      command_topic: /binky/GLOBAL/l4inverter/relay-out-b-in-b/command
      pin:
        number: "15"
        mcp23xxx: io3
        mode:
            output: true
text_sensor:
    - platform: wifi_info
      ip_address:
        name: ip_address
        state_topic: /binky/m4-r1/info/ip_address
i2c:
    frequency: 10kHz
    timeout: 100ms
mcp23008:
    - id: ios3
      address: "0x22"
    - id: ios4
      address: "0x23"
mcp23017:
    - id: io2
      address: "0x21"
    - id: io3
      address: "0x24"
