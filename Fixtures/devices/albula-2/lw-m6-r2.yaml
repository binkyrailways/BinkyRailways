button:
    - platform: restart
      id: reboot
      name: reboot
sensor:
    - platform: uptime
      id: uptime_sensor
      name: uptime_sensor
      state_topic: /binky/m6-r2/info/uptime
      update_interval: 15s
    - platform: wifi_signal
      id: wifi_signal_sensor
      name: wifi_signal_sensor
      state_topic: /binky/m6-r2/info/wifi_signal
switch:
    - platform: gpio
      id: led_red
      name: led_red
      pin:
        number: D5
        inverted: true
    - platform: gpio
      id: led_yellow
      name: led_yellow
      pin:
        number: D6
        inverted: true
    - platform: gpio
      id: led_green
      name: led_green
      pin:
        number: D7
        inverted: true
text_sensor:
    - platform: wifi_info
      ip_address:
        name: ip_address
        state_topic: /binky/m6-r2/info/ip_address
i2c:
    frequency: 10kHz
    timeout: 100ms
mcp23008:
    - id: ios1
      address: "0x21"
mcp23017:
    - id: io3
      address: "0x25"
    - id: io4
      address: "0x20"
