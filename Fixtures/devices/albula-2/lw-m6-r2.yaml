binary_sensor:
    - platform: gpio
      id: ios1_pin1
      name: ios1_pin1
      state_topic: /binky/m6/ios1_pin1/sensor/state
      qos: 1
      pin:
        number: "0"
        mcp23xxx: ios1
        mode:
            input: true
      on_state:
        then:
            - switch.turn_on: led_red
            - delay: 0.2s
            - switch.turn_off: led_red
