substitutions:
    name: m6-r2
packages:
    device: !include ../packages/device-d1mini.yaml
    networking: !include ../packages/networking.yaml
esphome:
    on_boot:
        - priority: 600
          then:
            - switch.turn_on: led_yellow
            - switch.turn_on: led_green
            - switch.turn_on: led_red
            - delay: 2s
            - switch.turn_off: led_yellow
            - switch.turn_off: led_green
            - switch.turn_off: led_red
logger:
    level: DEBUG
mqtt:
    on_connect:
        - switch.turn_on: led_green
    on_disconnect:
        - switch.turn_off: led_green
    topic_prefix: /binky/m6-r2/info
ota:
    platform: esphome
web_server:
    port: 80
    local: true
wifi:
    fast_connect: true
    domain: .tzl
    on_connect:
        - switch.turn_on: led_yellow
    on_disconnect:
        - switch.turn_off: led_yellow
interval:
    - interval: 15s
      then:
        - mqtt.publish:
            payload: !lambda |-
                return (id(ios1_pin1).state) ? "ON" : "OFF";
            topic: /binky/m6/ios1_pin1/sensor/state
        - mqtt.publish:
            payload: !lambda |-
                return (id(ios1_pin2).state) ? "ON" : "OFF";
